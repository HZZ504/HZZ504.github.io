<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzhi Zhang - LinkedIn Banner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }

        .banner {
            width: 1584px;
            height: 396px;
            position: relative;
            overflow: hidden;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 60px;
        }

        /* Animated grid background */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            z-index: 1;
        }

        .grid-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 170, 0.3), transparent);
        }

        .grid-line.horizontal {
            width: 100%;
            height: 1px;
        }

        .grid-line.vertical {
            width: 1px;
            height: 100%;
        }

        /* Gradient overlays */
        .gradient-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 212, 170, 0.1), transparent);
            top: -100px;
            right: 200px;
            z-index: 2;
        }

        .gradient-2 {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 168, 255, 0.08), transparent);
            bottom: -50px;
            left: 100px;
            z-index: 2;
        }

        .gradient-3 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124, 92, 252, 0.06), transparent);
            top: 50%;
            right: -50px;
            z-index: 2;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 10;
            flex: 1;
        }

        .main-title {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4aa 0%, #00a8ff 50%, #7c5cfc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 28px;
            color: #e8e8ed;
            font-weight: 500;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }

        .tech-badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(0, 212, 170, 0.15);
            border: 1px solid rgba(0, 212, 170, 0.4);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #00d4aa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .tech-badge:nth-child(2) {
            background: rgba(0, 168, 255, 0.15);
            border-color: rgba(0, 168, 255, 0.4);
            color: #00a8ff;
        }

        .tech-badge:nth-child(3) {
            background: rgba(124, 92, 252, 0.15);
            border-color: rgba(124, 92, 252, 0.4);
            color: #7c5cfc;
        }

        .tech-badge:nth-child(4) {
            background: rgba(0, 212, 170, 0.15);
            border-color: rgba(0, 212, 170, 0.4);
            color: #00d4aa;
        }

        .tech-badge:nth-child(5) {
            background: rgba(0, 168, 255, 0.15);
            border-color: rgba(0, 168, 255, 0.4);
            color: #00a8ff;
        }

        /* Floating keywords */
        .keywords {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 9;
            text-align: right;
        }

        .keyword {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
            margin: 8px 0;
            transition: all 0.3s ease;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        .keyword:nth-child(1) {
            color: rgba(0, 212, 170, 0.7);
            font-size: 20px;
        }

        .keyword:nth-child(2) {
            color: rgba(0, 168, 255, 0.7);
            font-size: 20px;
        }

        .keyword:nth-child(3) {
            color: rgba(124, 92, 252, 0.7);
            font-size: 20px;
        }

        .keyword:nth-child(4) {
            color: rgba(0, 212, 170, 0.5);
            font-size: 18px;
        }

        /* Accent line */
        .accent-line {
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #00d4aa, #00a8ff, #7c5cfc);
            z-index: 15;
        }

        /* Animation */
        @keyframes glow {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        .keyword:nth-child(1) {
            animation: glow 3s ease-in-out infinite;
        }

        .keyword:nth-child(2) {
            animation: glow 3.5s ease-in-out infinite 0.3s;
        }

        .keyword:nth-child(3) {
            animation: glow 4s ease-in-out infinite 0.6s;
        }

        /* Responsive adjustments */
        @media (max-width: 1600px) {
            .banner {
                width: 100%;
                padding: 30px 40px;
            }

            .main-title {
                font-size: 48px;
            }

            .subtitle {
                font-size: 24px;
            }

            .keywords {
                right: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="accent-line"></div>

        <div class="background">
            <svg width="100%" height="100%" style="position: absolute; top: 0; left: 0;">
                <defs>
                    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
                        <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(0, 212, 170, 0.1)" stroke-width="0.5"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" />
            </svg>
        </div>

        <div class="gradient-1"></div>
        <div class="gradient-2"></div>
        <div class="gradient-3"></div>

        <div class="content">
            <div class="main-title">张翰之<br>Hanzhi Zhang</div>
            <div class="subtitle">Staff Engineer</div>

            <div class="tech-stack">
                <div class="tech-badge">Risk Control</div>
                <div class="tech-badge">GNN</div>
                <div class="tech-badge">Multimodal AI</div>
                <div class="tech-badge">ML Systems</div>
                <div class="tech-badge">Real-time</div>
            </div>
        </div>

        <div class="keywords">
            <div class="keyword">Risk Control</div>
            <div class="keyword">GNN</div>
            <div class="keyword">Multimodal AI</div>
            <div class="keyword">Real-time Systems</div>
        </div>
    </div>
</body>
</html>
