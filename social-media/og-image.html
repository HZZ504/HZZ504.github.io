<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:image" content="og-image.html">
    <title>Hanzhi Zhang - Open Graph Image</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }

        .og-image {
            width: 1200px;
            height: 630px;
            position: relative;
            overflow: hidden;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 50px;
            text-align: center;
        }

        /* Background elements */
        .background-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0.03;
            z-index: 1;
        }

        /* Animated gradients */
        .gradient-blob-1 {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 212, 170, 0.15), transparent);
            top: -150px;
            right: -100px;
            z-index: 2;
            filter: blur(40px);
        }

        .gradient-blob-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 168, 255, 0.12), transparent);
            bottom: -100px;
            left: -100px;
            z-index: 2;
            filter: blur(40px);
        }

        .gradient-blob-3 {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124, 92, 252, 0.1), transparent);
            top: 50%;
            right: 5%;
            z-index: 2;
            filter: blur(40px);
        }

        /* Accent line */
        .top-accent {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #00d4aa, #00a8ff, #7c5cfc, transparent);
            z-index: 10;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 20;
            max-width: 1000px;
        }

        .name {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4aa 0%, #00a8ff 50%, #7c5cfc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .tagline {
            font-size: 42px;
            color: #e8e8ed;
            font-weight: 600;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }

        .role-description {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .role-item {
            font-size: 18px;
            color: #b8b8bf;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .role-item span {
            color: #00d4aa;
            font-weight: 700;
        }

        .role-item:nth-child(2) span {
            color: #00a8ff;
        }

        .role-item:nth-child(3) span {
            color: #7c5cfc;
        }

        /* Tech keywords */
        .tech-keywords {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .keyword-badge {
            padding: 8px 18px;
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid rgba(0, 212, 170, 0.3);
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            color: #00d4aa;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .keyword-badge:nth-child(2) {
            background: rgba(0, 168, 255, 0.1);
            border-color: rgba(0, 168, 255, 0.3);
            color: #00a8ff;
        }

        .keyword-badge:nth-child(3) {
            background: rgba(124, 92, 252, 0.1);
            border-color: rgba(124, 92, 252, 0.3);
            color: #7c5cfc;
        }

        .keyword-badge:nth-child(4) {
            background: rgba(0, 212, 170, 0.1);
            border-color: rgba(0, 212, 170, 0.3);
            color: #00d4aa;
        }

        .keyword-badge:nth-child(5) {
            background: rgba(0, 168, 255, 0.1);
            border-color: rgba(0, 168, 255, 0.3);
            color: #00a8ff;
        }

        .keyword-badge:nth-child(6) {
            background: rgba(124, 92, 252, 0.1);
            border-color: rgba(124, 92, 252, 0.3);
            color: #7c5cfc;
        }

        /* Website URL */
        .website-url {
            font-size: 24px;
            color: #b8b8bf;
            font-weight: 500;
            letter-spacing: 0.5px;
            padding: 15px 30px;
            border-top: 1px solid rgba(0, 212, 170, 0.2);
            border-bottom: 1px solid rgba(0, 212, 170, 0.2);
        }

        .website-url strong {
            color: #00d4aa;
            font-weight: 700;
        }

        /* Footer accent */
        .bottom-accent {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #7c5cfc, #00a8ff, #00d4aa);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="og-image">
        <svg class="background-grid" viewBox="0 0 1200 630">
            <defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0, 212, 170, 0.08)" stroke-width="0.5"/>
                </pattern>
            </defs>
            <rect width="1200" height="630" fill="url(#grid)" />
        </svg>

        <div class="gradient-blob-1"></div>
        <div class="gradient-blob-2"></div>
        <div class="gradient-blob-3"></div>

        <div class="top-accent"></div>

        <div class="content">
            <div class="name">张翰之 | Hanzhi Zhang</div>

            <div class="tagline">Staff Engineer · AI/ML · Risk Control</div>

            <div class="role-description">
                <div class="role-item"><span>11+ Years</span> in AI/ML</div>
                <div class="role-item"><span>GNN</span> Expert</div>
                <div class="role-item"><span>Risk Control</span> Pioneer</div>
            </div>

            <div class="tech-keywords">
                <div class="keyword-badge">Risk Control</div>
                <div class="keyword-badge">GNN</div>
                <div class="keyword-badge">Multimodal AI</div>
                <div class="keyword-badge">Real-time Systems</div>
                <div class="keyword-badge">MLOps</div>
                <div class="keyword-badge">Anti-Fraud</div>
            </div>

            <div class="website-url">
                Visit: <strong>hzz504.github.io</strong>
            </div>
        </div>

        <div class="bottom-accent"></div>
    </div>
</body>
</html>
